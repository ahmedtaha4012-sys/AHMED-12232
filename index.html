<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday!</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #ffe6e6;
    font-family: 'Segoe UI', sans-serif;
  }

  h1 {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff1a75;
    font-size: 3em;
    text-align: center;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 1s ease, transform 1s ease;
  }

  .flower {
    position: absolute;
    width: 30px;
    height: 30px;
    background-image: url('https://i.ibb.co/3hH3YvF/rose.png'); /* OR use 'rose.png' local */
    background-size: cover;
    pointer-events: none;
    opacity: 0;
    animation: pop 3s linear forwards;
  }

  .sparkle {
    position: absolute;
    width: 8px;
    height: 8px;
    background: gold;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
    animation: sparkle 1s linear forwards;
  }

  @keyframes pop {
    0% { transform: scale(0) rotate(0deg); opacity: 0; }
    50% { transform: scale(1.2) rotate(20deg); opacity: 1; }
    100% { transform: scale(1) translateY(-150px) rotate(360deg); opacity: 0; }
  }

  @keyframes sparkle {
    0% { transform: scale(0); opacity: 1; }
    100% { transform: scale(1.5) translateY(-50px); opacity: 0; }
  }
</style>
</head>
<body>

<h1 id="birthdayText"></h1>

<script>
  // 🌹 Continuous floating flowers
  function createFlower() {
    const flower = document.createElement('div');
    flower.className = 'flower';
    flower.style.left = Math.random() * window.innerWidth + 'px';
    flower.style.top = Math.random() * window.innerHeight + 'px';
    flower.style.animationDuration = (2 + Math.random() * 2) + 's';
    document.body.appendChild(flower);
    setTimeout(() => flower.remove(), 3000);
  }

  setInterval(createFlower, 300);

  // 🌟 Click interaction
  document.body.addEventListener('click', (e) => {
    createMagic(e.clientX, e.clientY);
  });

  // 💖 Magic flowers + sparkles + text
  function createMagic(x, y) {
    // Magic flowers from click
    for (let i = 0; i < 20; i++) {
      const flower = document.createElement('div');
      flower.className = 'flower';
      flower.style.left = x + (Math.random() * 100 - 50) + 'px';
      flower.style.top = y + (Math.random() * 100 - 50) + 'px';
      flower.style.animationDuration = (2 + Math.random() * 2) + 's';
      document.body.appendChild(flower);
      setTimeout(() => flower.remove(), 3000);
    }

    // Sparkles gradually
    for (let i = 0; i < 30; i++) {
      setTimeout(() => {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = x + (Math.random() * 120 - 60) + 'px';
        sparkle.style.top = y + (Math.random() * 120 - 60) + 'px';
        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 1000);
      }, i * 50);
    }

    // Typewriter effect for text
    const message = "Happy Birthday, My Love! 💖";
    const textEl = document.getElementById('birthdayText');
    if (textEl.innerHTML.length === 0) { // prevent retyping if clicked again
      let i = 0;
      textEl.style.opacity = 1;
      textEl.style.transform = "translate(-50%, -50%) scale(1.2)";

      function typeWriter() {
        if (i < message.length) {
          textEl.innerHTML += message.charAt(i);
          i++;
          setTimeout(typeWriter, 150);
        } else {
          textEl.style.transform = "translate(-50%, -50%) scale(1)";
        }
      }

      setTimeout(typeWriter, 500); // small delay for effect
    }
  }
</script>

</body>
</html>
